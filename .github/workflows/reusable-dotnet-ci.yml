name: reusable-dotnet-ci

# One CI to rule the B44 game repos: format gate, engine-free Core build,
# tests — all on a runner WITHOUT the Godot executable, which is the
# mechanical proof that the test suite stays engine-independent.
#
# Call from a game repo:
#   jobs:
#     ci:
#       uses: DA-Sandman-Jr/B44.Common/.github/workflows/reusable-dotnet-ci.yml@<sha>
#       with:
#         core-project: MyGame.Core/MyGame.Core.csproj
#         test-project: MyGame.Tests/MyGame.Tests.csproj

on:
  workflow_call:
    inputs:
      core-project:
        description: Path to the engine-free Core csproj (game repos). Omit in non-game repos to build the solution instead.
        required: false
        type: string
        default: ''
      test-project:
        description: Path to the test csproj
        required: true
        type: string
      dotnet-version:
        description: SDK version for setup-dotnet
        required: false
        type: string
        default: '10.0.x'
    secrets:
      b44-packages-pat:
        description: Deprecated compatibility input; B44 packages now restore from nuget.org and this value is ignored
        required: false

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Verify formatting
        run: |
          set -euo pipefail
          SLN=$(ls *.sln | head -1)
          if [ -z "$SLN" ]; then
            echo "No .sln at repo root — nothing to check."
            exit 0
          fi
          dotnet format "$SLN" --verify-no-changes

      - name: Build Core (no-Godot invariant)
        if: inputs.core-project != ''
        run: dotnet build ${{ inputs.core-project }} -c Debug -p:B44AgentSyncVerifyOnly=true

      - name: Build solution
        if: inputs.core-project == ''
        run: dotnet build -c Debug -p:B44AgentSyncVerifyOnly=true

      - name: Build test project
        run: dotnet build ${{ inputs.test-project }} -c Debug -p:B44AgentSyncVerifyOnly=true

      - name: Run tests
        run: dotnet test ${{ inputs.test-project }} -c Debug --no-build
