name: reusable-dotnet-ci

# One CI to rule the B44 game repos: format gate, engine-free Core build,
# tests — all on a runner WITHOUT the Godot executable, which is the
# mechanical proof that the test suite stays engine-independent.
#
# Call from a game repo:
#   jobs:
#     ci:
#       uses: DA-Sandman-Jr/B44.Common/.github/workflows/reusable-dotnet-ci.yml@<sha>
#       with:
#         core-project: MyGame.Core/MyGame.Core.csproj
#         test-project: MyGame.Tests/MyGame.Tests.csproj
#       secrets:
#         b44-packages-pat: ${{ secrets.B44_PACKAGES_PAT }}

on:
  workflow_call:
    inputs:
      core-project:
        description: Path to the engine-free Core csproj
        required: true
        type: string
      test-project:
        description: Path to the test csproj
        required: true
        type: string
      dotnet-version:
        description: SDK version for setup-dotnet
        required: false
        type: string
        default: '10.0.x'
    secrets:
      b44-packages-pat:
        description: PAT with read:packages for the B44 GitHub Packages feed (only needed once the repo consumes B44.* packages)
        required: false

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Add B44 package source
        env:
          B44_PACKAGES_PAT: ${{ secrets.b44-packages-pat }}
        run: |
          if [ -n "$B44_PACKAGES_PAT" ]; then
            dotnet nuget add source https://nuget.pkg.github.com/DA-Sandman-Jr/index.json \
              --name b44 --username DA-Sandman-Jr --password "$B44_PACKAGES_PAT" \
              --store-password-in-clear-text
          else
            echo "b44-packages-pat not provided; skipping B44 package source."
          fi

      - name: Verify formatting
        run: |
          set -euo pipefail
          SLN=$(ls *.sln | head -1)
          if [ -z "$SLN" ]; then
            echo "No .sln at repo root — nothing to check."
            exit 0
          fi
          dotnet format "$SLN" --verify-no-changes

      - name: Build Core (no-Godot invariant)
        run: dotnet build ${{ inputs.core-project }} -c Debug

      - name: Build test project
        run: dotnet build ${{ inputs.test-project }} -c Debug

      - name: Run tests
        run: dotnet test ${{ inputs.test-project }} -c Debug --no-build
