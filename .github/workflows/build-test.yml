name: build-test

# Compiles the package and runs the test suite. The companion format.yml only
# checks formatting; this is the gate that catches build breaks and failing
# tests before they land.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore B44.Common.sln

      - name: Verify synchronized guidance
        run: dotnet build B44.Common/B44.Common.csproj -c Debug --no-restore -p:B44AgentSyncVerifyOnly=true

      - name: Build solution
        run: dotnet build B44.Common.sln -c Debug --no-restore

      - name: Run tests
        run: dotnet test B44.Common.sln -c Debug --no-build
