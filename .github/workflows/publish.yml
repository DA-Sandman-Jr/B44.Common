name: publish

# Tag-driven publish to GitHub Packages. Push a tag like v0.1.0 and the
# matching package version lands on the DA-Sandman-Jr NuGet feed.
# GITHUB_TOKEN suffices for publishing from this repo; CONSUMING repos'
# Actions need a PAT (see README).

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run tests
        run: dotnet test B44.Common.Tests/B44.Common.Tests.csproj -c Release

      - name: Pack
        run: |
          dotnet pack B44.Common/B44.Common.csproj -c Release /p:Version=${GITHUB_REF_NAME#v}
          dotnet pack B44.Standards/B44.Standards.csproj -c Release /p:Version=${GITHUB_REF_NAME#v}

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "B44.Common/bin/Release/*.nupkg" \
            --source https://nuget.pkg.github.com/DA-Sandman-Jr/index.json \
            --api-key ${{ secrets.GITHUB_TOKEN }}
          dotnet nuget push "B44.Standards/bin/Release/*.nupkg" \
            --source https://nuget.pkg.github.com/DA-Sandman-Jr/index.json \
            --api-key ${{ secrets.GITHUB_TOKEN }}
