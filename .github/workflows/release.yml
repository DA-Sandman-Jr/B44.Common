name: Release to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    # Trusted Publishing: no long-lived API key. The job's OIDC token is
    # exchanged for a one-hour nuget.org API key against the trusted publishing
    # policy configured on nuget.org (repository owner DA-Sandman-Jr,
    # repository B44.Common, workflow file release.yml).
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore B44.Common.sln

      - name: Verify synchronized guidance
        run: dotnet build B44.Common/B44.Common.csproj --configuration Release --no-restore -p:B44AgentSyncVerifyOnly=true -p:Version=$VERSION

      - name: Build
        run: dotnet build B44.Common.sln --configuration Release --no-restore -p:Version=$VERSION

      - name: Test
        run: dotnet test B44.Common.sln --configuration Release --no-build --verbosity minimal

      - name: Pack (B44.Common + B44.Standards; tests are IsPackable=false)
        run: dotnet pack B44.Common.sln --configuration Release --no-build -p:Version=$VERSION --output ./nupkgs

      # Request the temp key right before the push; it expires after an hour.
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push packages to nuget.org
        run: |
          for pkg in nupkgs/*.nupkg; do
            dotnet nuget push "$pkg" \
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
